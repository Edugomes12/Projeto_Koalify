<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/login.css">
    <title>Login - Koalify</title>
</head>
<body>
    <header>
        <a href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="95" height="85" fill="black">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>
        <img src="/img/koalify.png" alt="mascote Koalify">
    </header>
   <main>
    <div class="container">
      <div class="form-area">
        <h1>Bem-Vindo De Volta!</h1>
        <p>Faça login para continuar</p>
        <form id="formLogin">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@gmail.com">

          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

          <p class="cabaço"><a href="senha.html">Esqueci minha senha</a></p>
          
          <button type="submit">Entrar</button>
        </form>
      </div>

      <div class="img-area">
        <img src="/img/login.png" alt="img login">
        <p><strong>Seus projetos Organizados,<br>Sua mente tranquila.</strong></p>
        <p>Koalify é o seu espaço para tirar <br> ideias do papel.</p>
      </div>
    </div>
  </main>

  <script src="/js/login.js"></script>
</body>
</html>
