<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/conta.css">
    <title>Koalify - Crie Sua conta</title>
</head>
<body>
    <header>
        <a href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="95" height="85" fill="black">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>
        <img src="/img/koalify.png" alt="mascote Koalify">
    </header>

<main>
    <div class="container">
      <div class="form-area">
        <h1>Crie Sua Conta</h1>
        <p>Comece a organizar seus projetos</p>
        <form id="formCadastro">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Seu Nome">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@gmail.com">

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

            <label for="confirmarSenha">Confirmar Senha</label>
            <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirmar Senha">

            <button type="submit">Cadastrar</button>
        </form>
      </div>

      <div class="img-area">
        <img src="/img/cadeado.png" alt="img de ilustração">
        <p>Junte-se a nos e organize<br>seus projetos com a <br> Koalify.</p>
      </div>
    </div>
  </main>

  <script src="/js/cadastro.js"></script>
</body>
</html>
