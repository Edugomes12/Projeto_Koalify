<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/senha.css">
    <title>Koalify - Redefinir Senha</title>
</head>
<body>
    <header> <a href="login.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="95" height="85" fill="black">
        <path d="M15 18l-6-6 6-6"/>
        </svg></a>
        <img src="/img/koalify.png" alt="mascote Koalify">
    </header>

   <main>
    <div class="container">
      <div class="form-area">
        <h1>Redefinir sua senha</h1>
        <p>Digite seu e-mail e a nova senha desejada.</p>
        <form id="formSenha">
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" placeholder="seu@gmail.com">

          <label for="novaSenha">Nova senha:</label>
          <input type="password" id="novaSenha" name="novaSenha" placeholder="Digite a nova senha">

          <label for="confirmarSenha">Confirmar nova senha:</label>
          <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirme a nova senha">

          <button type="submit">Redefinir senha</button>
        </form>
      </div>

      <div class="img-area">
        <img src="/img/cabaçodasenha.png" alt="img de ilustração">
        <p>Não se preocupe, acontece!<br>Vamos te ajudar a voltar rapidamente.</p>
      </div>
    </div>
  </main>

  <script src="/js/senha.js"></script>
</body>
</html>
